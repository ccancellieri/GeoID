[project]
name = "dynastore-ext-region-mapping"
dynamic = ["version"]
description = "DynaStore region-mapping extension — TerriaJS WMS region-mapping claims registry."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
region_mapping = "dynastore.extensions.region_mapping.region_mapping_service:RegionMappingService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"dynastore.extensions.region_mapping" = []

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/region_mapping/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
