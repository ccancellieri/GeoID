[project]
name = "dynastore-ext-volumes"
dynamic = ["version"]
description = "OGC API - 3D GeoVolumes + CityJSON support for dynastore"
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "shapely>=2.1.1",
    "geojson-pydantic>=1.0.0",
    "pyproj>=3.6",
    "cjio>=0.10.1",
    "DynaStore",
]

[project.optional-dependencies]
# cjvalpy 0.4.1 (the only version satisfying >=0.4.1) ships wheels only for
# cp38-cp311 on macOS/Windows and has no sdist, so it cannot be installed on
# our >=3.12 floor on any platform. The marker below keeps the requirement
# resolvable (`uv lock` needs every workspace extra to be satisfiable) while
# effectively disabling it until upstream publishes a compatible build;
# validate_cityjson() already treats a missing cjvalpy as a no-op.
validation = ["cjvalpy>=0.4.1; python_version < '3.12'"]

[project.entry-points."dynastore.extensions"]
volumes = "dynastore.extensions.volumes.volumes_service:VolumesService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"dynastore.extensions.volumes" = ["notebooks/*.ipynb", "static/**/*"]

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/volumes/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
