[project]
name = "dynastore-ext-renders"
dynamic = ["version"]
description = "DynaStore Raster Tile Renders extension — styled PNG/WebP tiles from COG assets."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "rio-tiler>=9.0",
    "rasterio>=1.4",
    "lxml>=4.9",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
renders = "dynastore.extensions.renders.renders_service:RendersService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/renders/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
