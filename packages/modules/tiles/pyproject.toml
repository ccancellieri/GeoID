#
# dynastore-module-tiles — thin packaging wheel for the tiles module.
#
# This wheel carries no source of its own: the TilesModule implementation
# lives in dynastore-core (packages/core/src/dynastore/modules/tiles/).
# Its sole purpose is to register the `tiles` entry-point under the
# `dynastore.modules` group so that the discovery loop in
# `dynastore.tools.discovery` loads TilesModule ONLY on services whose
# SCOPE explicitly pulls in `module_tiles`.
#
# Why a separate wheel?  `dynastore-core` is always installed (every service
# depends on it), so any entry-point declared there is always present in
# importlib.metadata.  Moving the entry-point here ensures it is absent from
# importlib.metadata on services that do not install this stub wheel.
# See refs #2465.

[project]
name = "dynastore-module-tiles"
dynamic = ["version"]
description = "DynaStore TilesModule entry-point — vector tile storage and TMS support."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
# The heavy runtime deps (morecantile, pmtiles, pyproj, shapely) are pulled
# in by the `module_tiles` extra in the root meta-package; they are NOT
# listed here to avoid duplicating version constraints in two places.
dependencies = [
    "dynastore-core",
]

# Entry-point declaration — the only reason this wheel exists.
# Source is in packages/core/src/dynastore/modules/tiles/tiles_module.py
# (always importable because dynastore-core is a dependency of every service).
[project.entry-points."dynastore.modules"]
tiles = "dynastore.modules.tiles.tiles_module:TilesModule"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

# No source in this wheel — the implementation ships in dynastore-core.
[tool.setuptools]
packages = []

[tool.uv.sources]
dynastore-core = { workspace = true }

[tool.setuptools_scm]
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
