#
# dynastore-module-gcp — thin packaging wheel for GCP modules.
#
# This wheel carries no source of its own: the GCPModule and BigQuery driver
# implementations live in dynastore-core
# (packages/core/src/dynastore/modules/gcp/ and
#  packages/core/src/dynastore/modules/storage/drivers/bigquery*).
# Its sole purpose is to register the `gcp` and `storage_bigquery`
# entry-points under the `dynastore.modules` group so that the discovery loop
# in `dynastore.tools.discovery` loads these modules ONLY on services whose
# SCOPE explicitly pulls in `module_gcp`.
#
# Why a separate wheel?  `dynastore-core` is always installed (every service
# depends on it), so any entry-point declared there is always present in
# importlib.metadata.  Moving the entry-points here ensures they are absent
# from importlib.metadata on services that do not install this stub wheel.
# See refs #2465.

[project]
name = "dynastore-module-gcp"
dynamic = ["version"]
description = "DynaStore GCPModule entry-points — GCS storage and BigQuery driver."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
# The heavy runtime deps (google-cloud-storage, google-cloud-bigquery, etc.)
# are pulled in by the `module_gcp` extra in the root meta-package; they are
# NOT listed here to avoid duplicating version constraints in two places.
dependencies = [
    "dynastore-core",
]

# Entry-point declarations — the only reason this wheel exists.
# Source lives in packages/core/src/dynastore/modules/gcp/ and
# packages/core/src/dynastore/modules/storage/drivers/ (always importable
# because dynastore-core is a dependency of every service).
[project.entry-points."dynastore.modules"]
gcp = "dynastore.modules.gcp.gcp_module:GCPModule"
storage_bigquery = "dynastore.modules.storage.drivers.bigquery:ItemsBigQueryDriver"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

# No source in this wheel — the implementation ships in dynastore-core.
[tool.setuptools]
packages = []

[tool.uv.sources]
dynastore-core = { workspace = true }

[tool.setuptools_scm]
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
