#
# dynastore-module-styles — thin packaging wheel for the styles module.
#
# This wheel carries no source of its own: the StylesModule implementation
# lives in dynastore-core (packages/core/src/dynastore/modules/styles/).
# Its sole purpose is to register the `styles` entry-point under the
# `dynastore.modules` group so that the discovery loop in
# `dynastore.tools.discovery` loads StylesModule ONLY on services whose
# SCOPE explicitly pulls in `module_styles`.
#
# Why a separate wheel?  `dynastore-core` is always installed (every service
# depends on it), so any entry-point declared there is always present in
# importlib.metadata.  Moving the entry-point here ensures it is absent from
# importlib.metadata on services that do not install this stub wheel.
# See refs #2465.

[project]
name = "dynastore-module-styles"
dynamic = ["version"]
description = "DynaStore StylesModule entry-point — OGC API Styles schema and service layer."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
# The heavy runtime dep (lxml) is pulled in by the `module_styles` extra in
# the root meta-package; it is NOT listed here to avoid duplicating version
# constraints in two places.  lxml is imported lazily inside styles/models.py
# and is not needed at StylesModule discovery time.
dependencies = [
    "dynastore-core",
]

# Entry-point declaration — the only reason this wheel exists.
# Source is in packages/core/src/dynastore/modules/styles/styles_module.py
# (always importable because dynastore-core is a dependency of every service).
[project.entry-points."dynastore.modules"]
styles = "dynastore.modules.styles.styles_module:StylesModule"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

# No source in this wheel — the implementation ships in dynastore-core.
[tool.setuptools]
packages = []

[tool.uv.sources]
dynastore-core = { workspace = true }

[tool.setuptools_scm]
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
