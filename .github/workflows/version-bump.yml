name: Tag Version

# Tag the merge commit on main with the next semver. The repo's version
# is derived from the latest reachable tag by setuptools-scm at build time —
# no VERSION file, no bump commit, no merge conflicts on feature branches.
#
# Triggers:
#   - push to main (PR merges + direct commits)
#   - workflow_dispatch (manual major/minor bump; main only — guarded below)
#
# Branch policy: ONLY main is auto-tagged. Release branches (e.g. stable)
# are tagged manually by their maintainer using the branch-prefixed form
#   stable-v0.20.83, stable-v0.20.83.1, ...
# Never put a bare v* tag on a release branch: the bump step finds the
# latest version via `--match 'v[0-9]*'`, so a bare 4-component tag like
# v0.20.83.1 would be picked up (and break MAJOR.MINOR.PATCH parsing) if
# the branch is ever merged back into main. The stable-v prefix keeps
# release-branch tags invisible to this workflow while setuptools-scm on
# that branch still versions from the last reachable v* tag.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      level:
        description: 'Bump level'
        required: false
        default: 'patch'
        type: choice
        options: [patch, minor, major]

concurrency:
  group: tag-version
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      # workflow_dispatch checks out `ref: main` regardless of the branch the
      # run was launched from, so a dispatch from stable would silently bump
      # MAIN's version. Fail loudly instead of surprising the maintainer.
      - name: Refuse dispatch from non-main branches
        if: github.event_name == 'workflow_dispatch' && github.ref_name != 'main'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "::error::Tag Version only auto-tags main (dispatched from '$REF_NAME')." \
               "Release branches are tagged manually, e.g. stable-v0.20.83.1 — see the header comment."
          exit 1

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Compute next tag
        id: tag
        env:
          LEVEL: ${{ github.event.inputs.level || 'patch' }}
        run: |
          set -euo pipefail
          # `git describe` avoids the `git tag -l | head -n1` SIGPIPE/pipefail
          # interaction (exit 141) once the tag list outgrows the pipe buffer.
          LATEST=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo "")
          LATEST="${LATEST#v}"
          LATEST="${LATEST:-0.0.0}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          case "$LEVEL" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch|"")
              PATCH=$((PATCH + 1))
              if [ "$PATCH" -gt 99 ]; then
                MINOR=$((MINOR + 1))
                PATCH=0
              fi
              ;;
            *) echo "Unknown level: $LEVEL" >&2; exit 1 ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "Tagging v${NEW} (was v${LATEST}, level=${LEVEL})"

      - name: Push tag
        env:
          NEW: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${NEW}" -m "Release v${NEW}"
          git push origin "v${NEW}"
